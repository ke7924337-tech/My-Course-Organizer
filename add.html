<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة كورس جديد</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Personal Course Organizer</h1>
        <nav>
            <ul>
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="courses.html">كورساتي</a></li>
                <li><a href="add.html" class="active">إضافة كورس</a></li>
                <li><a href="contact.html">تواصل معنا</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="form-section">
            <h2>إضافة كورس جديد إلى الجدول</h2>
            <form>
                <div class="form-group">
                    <label>اسم الكورس:</label>
                    <input type="text" placeholder="مثلاً: Programming 1">
                </div>
                <div class="form-group">
                    <label>المحاضر:</label>
                    <input type="text" placeholder="اسم الدكتور">
                </div>
                <div class="form-group">
                    <label>الساعات المعتمدة:</label>
                    <input type="number" placeholder="3">
                </div>
                <div class="form-group">
                    <label>ملاحظات:</label>
                    <textarea placeholder="أي تفاصيل إضافية..."></textarea>
                </div>
                <button type="submit" class="btn">إضافة الكورس</button>
            </form>
        </section>
    </main>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 - كنز عصام</p>
    </footer>
</body>
</html>
